<svg xmlns="http://www.w3.org/2000/svg" width="920" height="760" viewBox="0 0 920 760" role="img" aria-labelledby="title desc">
  <title id="title">riscv64 异常响应对应图</title>
  <desc id="desc">riscv64 异常响应对应图。同步异常源经过恒开短路总开关进入 trap，再按 stvec 进入 trap entry code，经异常分路短路开关和 scause.code 分派到具体异常处理。</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .gate-dash { fill: #f8fafc; stroke: #111827; stroke-width: 2; stroke-dasharray: 8 6; }
      .line { fill: none; stroke: #111827; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .label { font: 700 20px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .note { font: 600 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2563eb; text-anchor: middle; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="460" y="30" class="label">riscv64 异常响应对应图</text>

  <rect x="300" y="60" width="320" height="68" rx="12" ry="12" class="box"/>
  <text x="460" y="86" class="label">同步异常源</text>
  <text x="460" y="116" class="small">页故障 / 非法指令 / ecall / 访问异常</text>

  <line x1="460" y1="128" x2="460" y2="190" class="line" marker-end="url(#arrow)"/>

  <rect x="370" y="190" width="180" height="78" rx="12" ry="12" class="gate-dash"/>
  <text x="460" y="216" class="label">异常总开关</text>
  <text x="460" y="246" class="note">恒开 / 短路</text>

  <line x1="460" y1="268" x2="460" y2="330" class="line" marker-end="url(#arrow)"/>

  <rect x="390" y="330" width="140" height="68" rx="12" ry="12" class="box"/>
  <text x="460" y="356" class="label">trap taken</text>
  <text x="460" y="386" class="note">硬件采纳异常</text>

  <line x1="460" y1="398" x2="460" y2="460" class="line" marker-end="url(#arrow)"/>

  <rect x="360" y="460" width="200" height="68" rx="12" ry="12" class="box"/>
  <text x="460" y="486" class="label">入口地址选择</text>
  <text x="460" y="516" class="small">PC &lt;- stvec</text>

  <line x1="460" y1="528" x2="460" y2="590" class="line" marker-end="url(#arrow)"/>

  <rect x="330" y="590" width="260" height="68" rx="12" ry="12" class="box"/>
  <text x="460" y="616" class="label">trap entry code</text>
  <text x="460" y="646" class="note">已建立 scause / sepc / stval</text>

  <line x1="460" y1="658" x2="460" y2="720" class="line" marker-end="url(#arrow)"/>

  <rect x="150" y="720" width="160" height="68" rx="12" ry="12" class="gate-dash"/>
  <text x="230" y="746" class="label">异常分路开关</text>
  <text x="230" y="776" class="note">恒开 / 短路</text>

  <line x1="460" y1="754" x2="310" y2="754" class="line" marker-end="url(#arrow)"/>
  <line x1="310" y1="754" x2="310" y2="754" class="line"/>
  <line x1="310" y1="754" x2="380" y2="754" class="line" marker-end="url(#arrow)"/>

  <rect x="380" y="720" width="160" height="68" rx="12" ry="12" class="box"/>
  <text x="460" y="746" class="label">异常码分路</text>
  <text x="460" y="776" class="note">scause.code</text>

  <line x1="540" y1="754" x2="610" y2="754" class="line" marker-end="url(#arrow)"/>
  <rect x="610" y="720" width="180" height="68" rx="12" ry="12" class="box"/>
  <text x="700" y="746" class="label">页故障 / ecall 等</text>
  <text x="700" y="776" class="small">异常处理实例</text>
</svg>
