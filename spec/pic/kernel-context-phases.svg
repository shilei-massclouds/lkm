<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="240" viewBox="0 0 1080 240" role="img" aria-labelledby="title desc">
  <title id="title">内核上下文相关阶段划分</title>
  <desc id="desc">内核启动到常规运行的四个阶段：引导期、中断期、单核多任务期、多核运行期。</desc>
  <defs>
    <style>
      .title { font: 700 22px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .phase { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .label { font: 700 22px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 15px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; text-anchor: middle; dominant-baseline: middle; }
      .line { fill: none; stroke: #111827; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="540" y="34" class="title" text-anchor="middle">内核上下文相关阶段划分</text>

  <line x1="80" y1="120" x2="1000" y2="120" class="line" marker-end="url(#arrow)"/>

  <rect x="100" y="80" width="180" height="80" rx="14" ry="14" class="phase"/>
  <text x="190" y="104" class="label">引导期</text>
  <text x="190" y="132" class="small">Boot Phase</text>

  <rect x="320" y="80" width="180" height="80" rx="14" ry="14" class="phase"/>
  <text x="410" y="104" class="label">中断期</text>
  <text x="410" y="132" class="small">Interrupt Phase</text>

  <rect x="540" y="80" width="220" height="80" rx="14" ry="14" class="phase"/>
  <text x="650" y="104" class="label">单核多任务期</text>
  <text x="650" y="132" class="small">UP Multitask Phase</text>

  <rect x="800" y="80" width="180" height="80" rx="14" ry="14" class="phase"/>
  <text x="890" y="104" class="label">多核运行期</text>
  <text x="890" y="132" class="small">SMP Runtime Phase</text>

  <text x="190" y="198" class="small">引导入口 -> 中断启用前</text>
  <text x="410" y="198" class="small">中断启用 -> 多任务启动前</text>
  <text x="650" y="198" class="small">多任务启动 -> SMP启用前</text>
  <text x="890" y="198" class="small">SMP启用后常规运行</text>
</svg>
