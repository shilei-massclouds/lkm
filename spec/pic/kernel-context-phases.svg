<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="250" viewBox="0 0 1280 250" role="img" aria-labelledby="title desc">
  <title id="title">内核上下文相关阶段划分</title>
  <desc id="desc">内核启动前的准备期，以及内核启动到常规运行的四个阶段：引导期、中断期、单核多任务期、多核运行期。</desc>
  <defs>
    <style>
      .title { font: 700 22px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
      .phase { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .prepare { fill: #ffffff; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 8 6; }
      .label { font: 700 22px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 15px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #374151; text-anchor: middle; dominant-baseline: middle; }
      .muted { font: 600 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6b7280; text-anchor: middle; dominant-baseline: middle; }
      .line { fill: none; stroke: #111827; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="640" y="34" class="title" text-anchor="middle">内核上下文相关阶段划分</text>

  <line x1="70" y1="120" x2="1200" y2="120" class="line" marker-end="url(#arrow)"/>

  <rect x="80" y="80" width="160" height="80" rx="14" ry="14" class="prepare"/>
  <text x="160" y="104" class="label">准备期</text>
  <text x="160" y="132" class="small">Prepare Phase</text>

  <rect x="300" y="80" width="180" height="80" rx="14" ry="14" class="phase"/>
  <text x="390" y="104" class="label">引导期</text>
  <text x="390" y="132" class="small">Boot Phase</text>

  <rect x="520" y="80" width="180" height="80" rx="14" ry="14" class="phase"/>
  <text x="610" y="104" class="label">中断期</text>
  <text x="610" y="132" class="small">Interrupt Phase</text>

  <rect x="740" y="80" width="220" height="80" rx="14" ry="14" class="phase"/>
  <text x="850" y="104" class="label">单核多任务期</text>
  <text x="850" y="132" class="small">UP Multitask Phase</text>

  <rect x="1000" y="80" width="180" height="80" rx="14" ry="14" class="phase"/>
  <text x="1090" y="104" class="label">多核运行期</text>
  <text x="1090" y="132" class="small">SMP Runtime Phase</text>

  <text x="160" y="198" class="muted">引导入口之前</text>
  <text x="390" y="198" class="small">引导入口 -> 中断启用前</text>
  <text x="610" y="198" class="small">中断启用 -> 多任务启动前</text>
  <text x="850" y="198" class="small">多任务启动 -> SMP启用前</text>
  <text x="1090" y="198" class="small">SMP启用后常规运行</text>
</svg>
