<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" role="img" aria-labelledby="title desc">
  <title id="title">流的代表符号</title>
  <desc id="desc">左侧为常规流符号，右侧为事件流符号。</desc>
  <defs>
    <style>
      .stroke { fill: none; stroke: #111827; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-blue { fill: none; stroke: #2563eb; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 8 6; }
      .label { font: 700 28px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- 常规流：左侧，上长下短，整体左右对称 -->
  <path class="stroke" d="M 82 118 A 132 84 0 0 1 318 118" marker-end="url(#arrow)"/>
  <path class="stroke" d="M 300 174 A 84 66 0 0 1 210 236" marker-end="url(#arrow)"/>
  <path class="stroke" d="M 190 236 A 84 66 0 0 1 100 174" marker-end="url(#arrow)"/>
  <text x="200" y="174" class="label" text-anchor="middle">常规流</text>

  <path class="stroke-blue" d="M 318 118 C 390 92, 442 92, 500 118" marker-start="url(#arrow-blue)" marker-end="url(#arrow-blue)"/>

  <!-- 事件流：右侧，三条等长箭头 -->
  <line class="stroke" x1="500" y1="72" x2="500" y2="252"/>

  <line class="stroke" x1="500" y1="92" x2="732" y2="92" marker-end="url(#arrow)"/>
  <line class="stroke" x1="500" y1="162" x2="732" y2="162" marker-end="url(#arrow)"/>
  <line class="stroke" x1="500" y1="232" x2="732" y2="232" marker-end="url(#arrow)"/>

  <text x="764" y="170" class="label">事件流</text>
</svg>
