<svg xmlns="http://www.w3.org/2000/svg" width="860" height="980" viewBox="0 0 860 980" role="img" aria-labelledby="title desc">
  <title id="title">riscv64 中断响应对应图</title>
  <desc id="desc">riscv64 中断响应竖版对应图。异步中断源经过 sstatus.SIE 总开关和各自 sie 分开关后进入 trap，再按 stvec 进入 trap entry code，由 scause.interrupt 与 code 分路到具体中断处理。</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .gate { fill: #f8fafc; stroke: #111827; stroke-width: 2; }
      .line { fill: none; stroke: #111827; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .label { font: 700 20px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .note { font: 600 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2563eb; text-anchor: middle; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="430" y="30" class="label">riscv64 中断响应对应图</text>

  <rect x="300" y="60" width="260" height="68" rx="12" ry="12" class="box"/>
  <text x="430" y="86" class="label">异步中断源</text>
  <text x="430" y="116" class="small">外部 / 定时器 / 软件中断</text>

  <line x1="430" y1="128" x2="430" y2="180" class="line" marker-end="url(#arrow)"/>

  <rect x="360" y="180" width="140" height="78" rx="12" ry="12" class="gate"/>
  <text x="430" y="206" class="label">中断总开关</text>
  <text x="430" y="236" class="note">sstatus.SIE</text>

  <line x1="430" y1="258" x2="430" y2="320" class="line" marker-end="url(#arrow)"/>

  <rect x="320" y="320" width="220" height="68" rx="12" ry="12" class="box"/>
  <text x="430" y="346" class="label">中断待决 / 类型</text>
  <text x="430" y="376" class="small">软件 / 定时器 / 外部中断</text>

  <line x1="430" y1="388" x2="250" y2="458" class="line"/>
  <line x1="430" y1="388" x2="430" y2="458" class="line"/>
  <line x1="430" y1="388" x2="610" y2="458" class="line"/>

  <rect x="160" y="458" width="180" height="72" rx="12" ry="12" class="box"/>
  <rect x="340" y="458" width="180" height="72" rx="12" ry="12" class="box"/>
  <rect x="520" y="458" width="180" height="72" rx="12" ry="12" class="box"/>
  <text x="250" y="484" class="label">分开关</text>
  <text x="250" y="514" class="note">sie.SSIE</text>
  <text x="430" y="484" class="label">分开关</text>
  <text x="430" y="514" class="note">sie.STIE</text>
  <text x="610" y="484" class="label">分开关</text>
  <text x="610" y="514" class="note">sie.SEIE</text>

  <line x1="250" y1="530" x2="250" y2="600" class="line"/>
  <line x1="430" y1="530" x2="430" y2="600" class="line"/>
  <line x1="610" y1="530" x2="610" y2="600" class="line"/>
  <line x1="250" y1="600" x2="430" y2="600" class="line"/>
  <line x1="610" y1="600" x2="430" y2="600" class="line"/>
  <line x1="430" y1="600" x2="430" y2="652" class="line" marker-end="url(#arrow)"/>

  <rect x="360" y="652" width="140" height="68" rx="12" ry="12" class="box"/>
  <text x="430" y="678" class="label">trap taken</text>
  <text x="430" y="708" class="note">硬件采纳中断</text>

  <line x1="430" y1="720" x2="430" y2="782" class="line" marker-end="url(#arrow)"/>

  <rect x="330" y="782" width="200" height="68" rx="12" ry="12" class="box"/>
  <text x="430" y="808" class="label">入口地址选择</text>
  <text x="430" y="838" class="small">PC &lt;- stvec</text>

  <line x1="430" y1="850" x2="430" y2="912" class="line" marker-end="url(#arrow)"/>

  <rect x="300" y="912" width="260" height="56" rx="12" ry="12" class="box"/>
  <text x="430" y="934" class="label">trap entry code + scause 分路</text>
  <text x="430" y="958" class="small">SSIP / STIP / SEIP 处理</text>
</svg>
