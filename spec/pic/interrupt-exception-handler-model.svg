<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" role="img" aria-labelledby="title desc">
  <title id="title">riscv64 中断与异常响应对应图</title>
  <desc id="desc">更紧凑的 riscv64 中断与异常响应对应图。异步中断和同步异常分别经过总开关进入 trap taken；控制流再按 stvec 进入 trap entry code，并由 scause 分路。中断分路开关对应 sie 各位，异常分路为短路开关。</desc>
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .gate { fill: #f8fafc; stroke: #111827; stroke-width: 2; }
      .gate-dash { fill: #f8fafc; stroke: #111827; stroke-width: 2; stroke-dasharray: 8 6; }
      .line { fill: none; stroke: #111827; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .label { font: 700 20px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 600 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .note { font: 600 14px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2563eb; text-anchor: middle; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <text x="490" y="30" class="label">riscv64 中断 / 异常响应对应图</text>

  <!-- async interrupt lane -->
  <rect x="30" y="70" width="150" height="64" rx="12" ry="12" class="box"/>
  <text x="105" y="94" class="label">异步中断源</text>
  <text x="105" y="122" class="small">外部 / 定时器 / 软件</text>

  <line x1="180" y1="102" x2="220" y2="102" class="line" marker-end="url(#arrow)"/>

  <rect x="220" y="40" width="100" height="124" class="gate"/>
  <text x="270" y="72" class="label">中断</text>
  <text x="270" y="98" class="label">总开</text>
  <text x="270" y="124" class="label">关</text>
  <text x="270" y="188" class="note">sstatus.SIE</text>

  <line x1="320" y1="102" x2="370" y2="102" class="line" marker-end="url(#arrow)"/>

  <rect x="370" y="70" width="130" height="64" rx="12" ry="12" class="box"/>
  <text x="435" y="94" class="label">中断类型</text>
  <text x="435" y="122" class="small">待决原因</text>

  <!-- sync exception lane -->
  <rect x="30" y="250" width="150" height="64" rx="12" ry="12" class="box"/>
  <text x="105" y="274" class="label">同步异常源</text>
  <text x="105" y="302" class="small">执行流内部产生</text>

  <line x1="180" y1="282" x2="220" y2="282" class="line" marker-end="url(#arrow)"/>

  <rect x="220" y="220" width="100" height="124" class="gate-dash"/>
  <text x="270" y="252" class="label">异常</text>
  <text x="270" y="278" class="label">总开</text>
  <text x="270" y="304" class="label">关</text>
  <text x="270" y="368" class="note">恒开 / 短路</text>

  <line x1="320" y1="282" x2="560" y2="282" class="line"/>
  <line x1="560" y1="282" x2="560" y2="372" class="line" marker-end="url(#arrow)"/>

  <!-- interrupt subgroup gates -->
  <line x1="500" y1="102" x2="550" y2="58" class="line"/>
  <line x1="500" y1="102" x2="550" y2="102" class="line"/>
  <line x1="500" y1="102" x2="550" y2="146" class="line"/>

  <rect x="550" y="30" width="100" height="48" rx="10" ry="10" class="box"/>
  <rect x="550" y="78" width="100" height="48" rx="10" ry="10" class="box"/>
  <rect x="550" y="126" width="100" height="48" rx="10" ry="10" class="box"/>
  <text x="600" y="46" class="small">分开关</text>
  <text x="600" y="64" class="note">SSIE</text>
  <text x="600" y="94" class="small">分开关</text>
  <text x="600" y="112" class="note">STIE</text>
  <text x="600" y="142" class="small">分开关</text>
  <text x="600" y="160" class="note">SEIE</text>

  <path d="M 650 54 L 710 54 L 710 372" class="line"/>
  <path d="M 650 102 L 730 102 L 730 372" class="line"/>
  <path d="M 650 150 L 750 150 L 750 372" class="line"/>

  <!-- trap boundary -->
  <rect x="500" y="348" width="130" height="64" rx="12" ry="12" class="box"/>
  <text x="565" y="372" class="label">trap taken</text>
  <text x="565" y="400" class="note">硬件采纳 trap</text>

  <line x1="630" y1="380" x2="720" y2="380" class="line" marker-end="url(#arrow)"/>

  <rect x="720" y="348" width="140" height="64" rx="12" ry="12" class="box"/>
  <text x="790" y="370" class="label">入口地址选择</text>
  <text x="790" y="398" class="small">PC &lt;- stvec</text>

  <line x1="860" y1="380" x2="860" y2="470" class="line" marker-end="url(#arrow)"/>

  <rect x="780" y="470" width="160" height="64" rx="12" ry="12" class="box"/>
  <text x="860" y="494" class="label">trap entry code</text>
  <text x="860" y="522" class="note">已建立 scause / sepc / stval</text>

  <line x1="860" y1="534" x2="860" y2="610" class="line" marker-end="url(#arrow)"/>

  <rect x="780" y="610" width="160" height="64" rx="12" ry="12" class="box"/>
  <text x="860" y="634" class="label">原因分路</text>
  <text x="860" y="662" class="note">scause</text>

  <!-- outputs -->
  <line x1="780" y1="642" x2="640" y2="642" class="line" marker-end="url(#arrow)"/>
  <rect x="500" y="610" width="140" height="64" rx="12" ry="12" class="box"/>
  <text x="570" y="634" class="label">SSIP/STIP/SEIP</text>
  <text x="570" y="662" class="small">中断处理分路</text>

  <line x1="940" y1="642" x2="1000" y2="642" class="line" marker-end="url(#arrow)"/>
  <rect x="1000" y="610" width="120" height="64" rx="10" ry="10" class="gate-dash"/>
  <text x="1060" y="634" class="small">分开关</text>
  <text x="1060" y="662" class="note">恒开 / 短路</text>

  <line x1="1120" y1="642" x2="1180" y2="642" class="line" marker-end="url(#arrow)"/>
  <rect x="1180" y="610" width="130" height="64" rx="12" ry="12" class="box"/>
  <text x="1245" y="634" class="label">异常码分路</text>
  <text x="1245" y="662" class="note">scause.code</text>

  <line x1="1310" y1="642" x2="1370" y2="642" class="line" marker-end="url(#arrow)"/>
  <rect x="1370" y="610" width="130" height="64" rx="12" ry="12" class="box"/>
  <text x="1435" y="634" class="label">页故障 / ecall</text>
  <text x="1435" y="662" class="small">异常处理实例</text>
</svg>
